name: Publish to npm

# Publishes the MCP server package (grok-build-x-search-mcp) to the npm registry
# when you push a version tag, e.g. `git tag v0.1.1 && git push --tags`.
#
# How to release (fixes + new features):
#   1. Make changes + bump version in package.json + update CHANGELOG.md
#   2. git commit -am "chore(release): vX.Y.Z - ..."
#   3. git tag vX.Y.Z
#   4. git push && git push --tags
#
# This workflow uses OIDC + Trusted Publisher (configured on the npm package page).
# No NPM_TOKEN secret is required.
#
# This workflow will:
# - Run tests
# - Publish to https://www.npmjs.com/package/grok-build-x-search-mcp (with provenance)
# - Existing npx users (`npx -y grok-build-x-search-mcp`) automatically get the new version on their next run.
# - Users with a previously installed/cached version must run `npm update -g grok-build-x-search-mcp` or reinstall.
# - No automatic push/email notification to end users. Announce via GitHub Release (recommended), updated README/CHANGELOG, and any social channels.

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    # Only the real repo can publish (protects forks).
    if: github.repository == 'nightwalker89/grok-build-plugin'

    permissions:
      contents: read
      id-token: write   # Enables npm provenance / trusted publishing (recommended)

    env:
      # Opt into Node.js 24 for actions to avoid deprecation of Node 20 (effective June 2026)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm test
      # Use token auth from secret (reliable for publish) + OIDC/Trusted Publisher as configured.
      # The secret provides the auth that works for this package.
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Confirm published version
        run: npm view grok-build-x-search-mcp version
